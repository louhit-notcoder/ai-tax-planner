services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-green_papaya}
      POSTGRES_USER: ${POSTGRES_USER:-green_papaya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-green_papaya} -d ${POSTGRES_DB:-green_papaya}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-greenpapaya}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-minio-local}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-greenpapaya} ${MINIO_ROOT_PASSWORD:-change-me-minio-local};
      mc mb --ignore-existing local/${S3_BUCKET:-green-papaya};
      mc anonymous set none local/${S3_BUCKET:-green-papaya};
      exit 0;"

  clamav:
    image: clamav/clamav:1.4
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "1"]
      interval: 30s
      timeout: 10s
      retries: 20

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      GREEN_PAPAYA_ENV: ${GREEN_PAPAYA_ENV:-development}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-green_papaya}:${POSTGRES_PASSWORD:-change-me-local-only}@postgres:5432/${POSTGRES_DB:-green_papaya}
      REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-green-papaya}
      S3_REGION: ap-south-1
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-greenpapaya}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-change-me-minio-local}
      CLAMD_HOST: clamav
      CLAMD_PORT: 3310
      MALWARE_SCAN_REQUIRED: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      clamav:
        condition: service_healthy
    command: >
      /bin/sh -c "alembic upgrade head &&
      uvicorn main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips '*'"

  worker:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      GREEN_PAPAYA_ENV: ${GREEN_PAPAYA_ENV:-development}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-green_papaya}:${POSTGRES_PASSWORD:-change-me-local-only}@postgres:5432/${POSTGRES_DB:-green_papaya}
      REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-green-papaya}
      S3_REGION: ap-south-1
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-greenpapaya}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-change-me-minio-local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: ["python", "-m", "app.workers.runner"]

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: http://localhost:8000
    restart: unless-stopped
    ports:
      - "3004:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clamav_data:

# Render Blueprint - Green Papaya V3 Backend
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: green-papaya-backend
    runtime: python
    region: singapore
    buildCommand: pip install -r requirements-production.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: GREEN_PAPAYA_ENV
        value: development
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        value: redis://localhost:6379/0
      - key: RATE_LIMIT_BACKEND
        value: memory
      - key: JWT_SECRET
        sync: false
      - key: JWT_ISSUER
        value: green-papaya-v3
      - key: ACCESS_TOKEN_MINUTES
        value: 30
      - key: REFRESH_TOKEN_DAYS
        value: 14
      - key: APP_BASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      # Frontend (Vercel) and API (Render) are different sites, so auth cookies
      # must be SameSite=None; Secure or the browser drops them on cross-site XHR.
      - key: COOKIE_SAMESITE
        value: none
      - key: COOKIE_SECURE
        value: "true"
      - key: ENCRYPTION_KEY_HEX
        sync: false
      - key: BLIND_INDEX_SECRET
        sync: false
      - key: REQUIRE_MFA_FOR_PRIVILEGED_ROLES
        value: "false"
      - key: ALLOW_DEV_BOOTSTRAP
        value: "true"
      - key: DEV_BOOTSTRAP_EMAIL
        sync: false
      - key: DEV_BOOTSTRAP_PASSWORD
        sync: false
      - key: STORAGE_BACKEND
        value: local
      - key: LOCAL_STORAGE_ROOT
        value: /tmp/storage
      - key: MAX_UPLOAD_BYTES
        value: 52428800
      - key: MALWARE_SCAN_REQUIRED
        value: "false"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_ASSISTANT_MODEL
        value: anthropic/claude-sonnet-4-20250514
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
